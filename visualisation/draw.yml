combos:
  # danger keys
  - { p: [15, 16], k: "sys reset", l: [danger], a: top }
  - { p: [14, 17], k: "boot- loader", l: [danger], a: bottom }

  # lock keys
  - { p: [15, 17], k: $$mdi:sleep$$, l: [functions] }
  - { p: [14, 18], k: $$mdi:lock$$, l: [functions], a: bottom, offset: 0.15 }
  - {
      p: [13, 19],
      k: $$mdi:keyboard-off$$,
      l: [functions],
      a: bottom,
      offset: 0.75,
    }

  # Special Alphas
  - { p: [1, 2], k: "Qu", l: [alpha] }
  - { p: [11, 12], k: $$mdi:keyboard-esc$$, l: [alpha] }
  - { p: [19, 20], k: $$mdi:keyboard-tab$$, l: [alpha] }
  - { p: [12, 20], k: "sch", l: [alpha], a: top }
  - { p: [17, 18], k: { t: "√§", s: "√Ą" }, l: [alpha], slide: -0.3 }
  - {
      p: [28, 18],
      k: { t: "√∂", s: "√Ė" },
      l: [alpha],
      slide: 0.75,
      a: right,
      offset: -0.15,
    }
  - {
      p: [27, 18],
      k: { t: "√ľ", s: "√ú" },
      l: [alpha],
      slide: -0.75,
      a: right,
      offset: -1.1,
    }
  - { p: [12, 18], k: "√ü", l: [alpha], slide: -0.93 }

  - { p: [15, 16], k: "CapsW", l: [alpha] }
  - { p: [11, 20], k: "1-shot ‚áß", l: [alpha], a: bottom }
  - { p: [31, 32], k: "‚Ćę Word", l: [alpha, symbols, numbers, commands], a: top }

  - {
      p: [32, 33],
      k: "Shift (in_CRD)",
      l: [alpha],
      a: bottom,
      slide: 1,
      offset: 1,
    }

  # Layer switching
  # to Alp is not a chord, but a key on the COM layer
  - { p: [31, 34], k: "to Alp", l: [alpha], a: bottom, offset: 0.5, type: held }
  - {
      p: [31, 34],
      k: "to Alp",
      l: [symbols, numbers, commands],
      a: bottom,
      offset: 0.5,
    }
  - {
      p: [33, 34],
      k: "mo FUN",
      l: [alpha, symbols, numbers, commands, functions],
      a: bottom,
      offset: 0.5,
    }
  - {
      p: [33, 34],
      k: "mo FUN",
      l: [functions],
      a: bottom,
      offset: 0.5,
      type: held,
    }
  - {
      p: [31, 32],
      k: "mo CMD",
      l: [alpha, symbols, numbers, commands, functions],
      a: bottom,
      offset: 0.5,
    }
  - {
      p: [31, 32],
      k: "mo CMD",
      l: [commands],
      a: bottom,
      offset: 0.5,
      type: held,
    }
  - { p: [29, 30], k: "mo DAN", l: [functions] }
  - { p: [29, 30], k: "mo DAN", l: [danger], type: held }
